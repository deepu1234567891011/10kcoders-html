<!DOCTYPE html>
<html>
    <head>
        <title></title>
    </head>
    <style>
        .parent{
            height: 800px;
            width: 800px;
            background-color: blue;
            display: flex;
            flex-direction: row;
            flex:wrap;
            flex-flow:row wrap;
            justify-content: flex-start;
            align-items: start;
            align-content: start;
        }
        .child{
            height: 60px;
            width:60px;
            background-color: gold;
            margin: 3px;
        }
        #child1{
            order: 0;
            
        }
        #child2{
            flex-grow: 2;
            
        }
        #child3{
             align-self: center;
            
        }
        
        
    </style>
    <body>
        <div class="parent">
            <div class="child" id="child1">c1</div>
            <div class="child" id="child2">c2</div>
            <div class="child" id="child3">c3</div>
            <div class="child" id="child4">c4</div>
            <div class="child" id="child5">c5</div>
        </div>
    </body>
</html>
